<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Pulse — AI-powered news that makes you think. Read, reflect, and engage with stories that matter.">
  <title>Pulse — News You Actually Think About</title>
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo"><span class="dot"></span>Pulse</div>
    <div class="nav-right">
      <button class="icon-btn" id="sound-btn" title="Ambient sound" onclick="toggleSound()">🔇</button>
      <button class="theme-toggle" id="theme-toggle-btn" title="Toggle theme" onclick="toggleTheme()">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
      <button class="icon-btn" id="refresh-btn" title="Refresh feed" onclick="refreshFeed()">↻</button>
    </div>
  </div>
</nav>

<main>

<div class="chips-wrap">
  <div class="chips" id="chips">
    <button class="chip active" data-topic="all">All</button>
    <button class="chip" data-topic="Tech">Tech</button>
    <button class="chip" data-topic="Science">Science</button>
    <button class="chip" data-topic="World">World</button>
    <button class="chip" data-topic="Business">Business</button>
    <button class="chip" data-topic="Health">Health</button>
    <button class="chip" data-topic="Space">Space</button>
    <button class="chip" data-topic="Climate">Climate</button>
  </div>
  <div class="compression-bar">
    <button class="compression-toggle" onclick="toggleCompression()">⚡ 60-Second Mode</button>
  </div>
  <div class="compression-panel" id="compression-panel"></div>
</div>

<div class="feed" id="feed"></div>
<div class="load-trigger" id="load-trigger">
  <div class="load-spinner" id="load-spinner"></div>
</div>

</main>

<div class="dna-badge" id="dna-badge" onclick="toggleDnaPanel()" title="Your Reading DNA"></div>
<div class="dna-panel" id="dna-panel">
  <h4>Your Reading DNA</h4>
  <div id="dna-content"></div>
</div>

<!-- 12 Feature Modules — load in dependency order -->
<script src="js/01-theme.js"></script>
<script src="js/02-sound.js"></script>
<script src="js/03-dna.js"></script>
<script src="js/04-bias.js"></script>
<script src="js/05-decay.js"></script>
<script src="js/06-pace.js"></script>
<script src="js/07-fossil.js"></script>
<script src="js/08-counter.js"></script>
<script src="js/09-compress.js"></script>
<script src="js/10-silent.js"></script>
<script src="js/11-debate.js"></script>
<script src="js/12-timeshift.js"></script>
<script src="js/core.js"></script>

</body>
</html>
