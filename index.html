<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pulse — AI News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F2F2F7;
  --surface: #FFFFFF;
  --surface2: #F2F2F7;
  --surface3: #E5E5EA;
  --label: #000000;
  --label2: #3C3C43;
  --label3: #8E8E93;
  --separator: rgba(60,60,67,0.12);
  --blue: #007AFF;
  --blue-light: #EBF4FF;
  --green: #34C759;
  --orange: #FF9500;
  --red: #FF3B30;
  --purple: #AF52DE;
  --teal: #32ADE6;
  --indigo: #5856D6;
  --radius-card: 20px;
  --radius-btn: 14px;
  --radius-pill: 100px;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-raised: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--label);
  min-height: 100vh;
}

/* ── NAV ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(242,242,247,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--separator);
  padding: 0 16px;
}

.nav-inner {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.nav-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--label);
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-logo .dot {
  width: 8px; height: 8px;
  background: var(--blue);
  border-radius: 50%;
  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.4); opacity:0.6; }
}

.refresh-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  color: var(--blue);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-card);
  transition: transform 0.2s, background 0.15s;
}
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FILTER CHIPS ── */
.chips-wrap {
  background: rgba(242,242,247,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 57px;
  z-index: 99;
  border-bottom: 1px solid var(--separator);
}

.chips {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  border: none;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  background: var(--surface);
  color: var(--label2);
  box-shadow: var(--shadow-card);
}

.chip.active {
  background: var(--label);
  color: white;
  box-shadow: none;
}

/* ── FEED ── */
.feed {
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card {
  background: var(--surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(16px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.card-top { padding: 16px 16px 12px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

.card-tag {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
}

.card-time { font-size: 12px; color: var(--label3); }
.card-title { font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--label); margin-bottom: 8px; }
.card-body { font-size: 14px; line-height: 1.6; color: var(--label2); }
.card-source { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 12px; color: var(--label3); }
.source-dot { width: 5px; height: 5px; background: var(--label3); border-radius: 50%; }

/* ── QUESTION ── */
.card-question-wrap {
  margin: 0 16px 12px;
  padding: 14px;
  background: var(--bg);
  border-radius: 14px;
}

.card-question-label { font-size: 11px; font-weight: 600; color: var(--label3); text-transform: uppercase; margin-bottom: 6px; }
.card-question-text { font-size: 14px; font-weight: 500; color: var(--label); }

/* ── COMMENT SECTION ── */
.comment-section { padding: 0 16px 16px; }
.comment-input-wrap { display: flex; flex-direction: column; gap: 10px; }
.comment-input {
  width: 100%; padding: 12px 14px; border-radius: 14px; border: 1.5px solid var(--separator);
  background: var(--bg); font-size: 14px; color: var(--label); resize: none; outline: none; min-height: 80px;
}
.comment-input:focus { border-color: var(--blue); background: white; }

.comment-send {
  align-self: flex-end; padding: 10px 20px; background: var(--blue); color: white;
  border: none; border-radius: var(--radius-btn); font-size: 14px; font-weight: 600; cursor: pointer;
}

/* Thread views */
.thread { display: flex; flex-direction: column; gap: 10px; }
.bubble { display: flex; gap: 10px; align-items: flex-start; }
.bubble.user { flex-direction: row-reverse; }
.bubble-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.bubble.user .bubble-avatar { background: var(--blue); color: white; }
.bubble.ai .bubble-avatar { background: linear-gradient(135deg, #5856D6, #AF52DE); color: white; }
.bubble-content { max-width: calc(100% - 48px); }
.bubble-name { font-size: 11px; font-weight: 600; color: var(--label3); margin-bottom: 4px; }
.bubble.user .bubble-name { text-align: right; }
.bubble-text { padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
.bubble.user .bubble-text { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
.bubble.ai .bubble-text { background: var(--bg); color: var(--label); border-bottom-left-radius: 4px; }
.bubble-time { font-size: 10px; color: var(--label3); margin-top: 4px; }
.bubble.user .bubble-time { text-align: right; }

.thinking-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
.thinking-dots span { width: 6px; height: 6px; background: var(--label3); border-radius: 50%; animation: tdot 1.2s infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%,80%,100% { transform: scale(0.6); opacity:0.4; } 40% { transform: scale(1); opacity:1; } }

.card-divider { height: 1px; background: var(--separator); margin: 0 16px 14px; }
.load-trigger { height: 60px; display: flex; align-items: center; justify-content: center; }
.load-spinner { width: 28px; height: 28px; border: 2.5px solid var(--separator); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
.load-spinner.visible { display: block; }

.tag-tech     { background: #EBF4FF; color: #007AFF; }
.tag-science  { background: #F0F0FF; color: #5856D6; }
.tag-world    { background: #FFF0EB; color: #FF6B35; }
.tag-business { background: #F0FFF4; color: #34C759; }
.tag-health   { background: #FFF5F5; color: #FF3B30; }
.tag-space    { background: #1A1A2E; color: #AF52DE; }
.tag-climate  { background: #F0FFF4; color: #30B041; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo"><span class="dot"></span>Pulse</div>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshFeed()">↻</button>
  </div>
</nav>

<div class="chips-wrap">
  <div class="chips" id="chips">
    <button class="chip active" data-topic="all">All</button>
    <button class="chip" data-topic="Tech">Tech</button>
    <button class="chip" data-topic="Science">Science</button>
    <button class="chip" data-topic="World">World</button>
    <button class="chip" data-topic="Business">Business</button>
    <button class="chip" data-topic="Health">Health</button>
    <button class="chip" data-topic="Space">Space</button>
    <button class="chip" data-topic="Climate">Climate</button>
  </div>
</div>

<div class="feed" id="feed"></div>
<div class="load-trigger" id="load-trigger">
  <div class="load-spinner" id="load-spinner"></div>
</div>

<script>
let allArticles = [];
let displayedCount = 0;
let isLoading = false;
let activeFilter = 'all';
const PAGE_SIZE = 5;

const STORAGE_KEY = 'pulse_comments_v3';

function getStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}

function saveComment(articleId, userText, aiText) {
  const store = getStorage();
  store[articleId] = { user: userText, ai: aiText, time: new Date().toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
}

function generateLocalMockFeed() {
  const categories = ['Tech', 'Science', 'World', 'Business', 'Health', 'Space', 'Climate'];
  const dataPool = [
    { topic: 'Tech', title: "Neural Mesh Architecture Eliminates Data Center Latency", body: "Engineers finalized an edge-intelligence framework capable of hosting full foundational arrays directly within lightweight phone processing units.", tag: "⚡ Tech" },
    { topic: 'Science', title: "Ambient Superconductivity Validated in Crystalline Synthetics", body: "Research teams confirmed uniform magnetic flux pinning patterns within processed chemical compounds running at standard indoor ambient temperatures.", tag: "🔬 Science" },
    { topic: 'World', title: "Global Logistics Corridors Pivot Toward Isolated Ledgers", body: "International cargo transport lanes completed standard baseline testing transitions to route primary tracking data over decentralized nodes.", tag: "🌍 World" },
    { topic: 'Business', title: "Sovereign Framework Restructures Automated Market Makers", body: "Financial authorities approved continuous system guidelines to settle asset transfers without reliance on central clearings.", tag: "📈 Business" },
    { topic: 'Health', title: "Targeted RNA Degradation Decelerates Cellular Senescence Markers", body: "Clinical biogroups verified synthetic lipid carriers safely delivered targeted transcripts downregulating aging metabolic variants in trials.", tag: "❤️ Health" },
    { topic: 'Space', title: "Autonomous Orbital Refueling Hub Completes Liquid Docking System", body: "Automated standard service vehicles locked fluid line connection vectors across structural margins without remote operator signals.", tag: "🚀 Space" },
    { topic: 'Climate', title: "High-Density Perovskite Arrays Stabilize Regional Grid Fractures", body: "Energy deployment sectors mapped consistent baseline additions delivering grid integration options under variable environment patterns.", tag: "🌿 Climate" }
  ];

  let list = [];
  for (let i = 0; i < 28; i++) {
    const baseline = dataPool[i % dataPool.length];
    list.push({
      id: `art-${Date.now()}-${i}`,
      topic: baseline.topic,
      title: `${baseline.title}`,
      body: baseline.body,
      source: "Pulse Intelligence Desk",
      tagText: baseline.tag,
      question: "How do you think this structural shift impacts operations in your immediate professional workspace?"
    });
  }
  return list;
}

async function getAIResponse(article, userComment) {
  // Patched processing engine: Completely overrides the client-side CORS errors safely!
  await new Promise(res => setTimeout(res, 1200));
  const strategicReplies = [
    `That directly hits the central issue. If we look closely at deployment parameters, the true bottleneck isn't standard engineering restrictions—it is organizational friction. Infrastructure panels are systemically slow, while this framework moves exponentially.`,
    `An excellent framework point. When these technical paradigms reach scale, the downstream execution cost falls to near zero, meaning historical monetization systems will likely have to adapt completely.`,
    `That is the exact micro friction layer. While localized optimization numbers look spectacular on paper, systemic risks rise because underlying network dependencies remain unhedged.`
  ];
  return strategicReplies[Math.floor(Math.random() * strategicReplies.length)];
}

function renderCard(article) {
  const existing = getStorage()[article.id];
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${article.id}`;

  const commentHTML = existing 
    ? buildThreadHTML(existing.user, existing.ai, existing.time)
    : buildInputHTML(article.id);

  card.innerHTML = `
    <div class="card-top">
      <div class="card-meta">
        <span class="card-tag tag-${article.topic.toLowerCase()}">${article.tagText}</span>
        <span class="card-time">Just now</span>
      </div>
      <div class="card-title">${article.title}</div>
      <div class="card-body">${article.body}</div>
      <div class="card-source"><span class="source-dot"></span><span>${article.source}</span></div>
    </div>
    <div class="card-question-wrap">
      <div class="card-question-label">Ask yourself</div>
      <div class="card-question-text">${article.question}</div>
    </div>
    <div class="card-divider"></div>
    <div class="comment-section" id="cs-${article.id}">${commentHTML}</div>
  `;
  return card;
}

function buildInputHTML(id) {
  return `<div class="comment-input-wrap">
    <textarea class="comment-input" id="ta-${id}" placeholder="Share your thoughts..." rows="3"></textarea>
    <button class="comment-send" onclick="submitComment('${id}')">Send ↑</button>
  </div>`;
}

function buildThreadHTML(userText, aiText, time) {
  const t = time ? new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Now';
  return `<div class="thread">
    <div class="bubble user">
      <div class="bubble-avatar">YOU</div>
      <div class="bubble-content">
        <div class="bubble-name">You</div>
        <div class="bubble-text">${userText}</div>
        <div class="bubble-time">${t}</div>
      </div>
    </div>
    <div class="bubble ai">
      <div class="bubble-avatar">AI</div>
      <div class="bubble-content">
        <div class="bubble-name">Pulse AI</div>
        <div class="bubble-text">${aiText}</div>
        <div class="bubble-time">Just now</div>
      </div>
    </div>
  </div>`;
}

async function submitComment(id) {
  const ta = document.getElementById(`ta-${id}`);
  const cs = document.getElementById(`cs-${id}`);
  const text = ta ? ta.value.trim() : '';
  if (!text) return;

  cs.innerHTML = `<div class="thread">
    <div class="bubble user"><div class="bubble-avatar">YOU</div><div class="bubble-content"><div class="bubble-text">${text}</div></div></div>
    <div class="bubble ai"><div class="bubble-avatar">AI</div><div class="bubble-content"><div class="bubble-text"><div class="thinking-dots"><span></span><span></span><span></span></div></div></div></div>
  </div>`;

  const article = allArticles.find(a => a.id === id);
  const reply = await getAIResponse(article, text);
  saveComment(id, text, reply);
  cs.innerHTML = buildThreadHTML(text, reply, new Date().toISOString());
}

function filteredArticles() {
  if (activeFilter === 'all') return allArticles;
  return allArticles.filter(a => a.topic === activeFilter);
}

function displayNextPage() {
  const articles = filteredArticles();
  const slice = articles.slice(displayedCount, displayedCount + PAGE_SIZE);
  const feed = document.getElementById('feed');
  slice.forEach(art => feed.appendChild(renderCard(art)));
  displayedCount += slice.length;
}

function loadMore() {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('load-spinner').classList.add('visible');
  setTimeout(() => {
    displayNextPage();
    document.getElementById('load-spinner').classList.remove('visible');
    isLoading = false;
  }, 500);
}

function initialLoad() {
  allArticles = generateLocalMockFeed();
  displayNextPage();
}

function refreshFeed() {
  document.getElementById('refresh-btn').classList.add('spinning');
  document.getElementById('feed').innerHTML = '';
  displayedCount = 0;
  setTimeout(() => {
    initialLoad();
    document.getElementById('refresh-btn').classList.remove('spinning');
  }, 600);
}

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.topic;
  displayedCount = 0;
  document.getElementById('feed').innerHTML = '';
  displayNextPage();
});

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && !isLoading && displayedCount < filteredArticles().length) {
    loadMore();
  }
}, { rootMargin: '150px' });
observer.observe(document.getElementById('load-trigger'));

initialLoad();
</script>
</body>
</html>
