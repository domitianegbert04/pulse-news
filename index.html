<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pulse — AI News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo"><span class="dot"></span>Pulse</div>
    <div class="nav-controls">
      <button class="sound-btn" id="sound-btn" onclick="toggleSound()" title="Ambient sound">🔇</button>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshFeed()">↻</button>
    </div>
  </div>
</nav>

<div class="bias-banner" id="bias-banner">
  <span>⚠️</span>
  <span id="bias-text">You seem to be leaning heavily toward one perspective. Consider exploring other angles.</span>
</div>

<div class="compression-bar" id="compression-bar">
  <button class="compression-btn" onclick="compressFeed()">
    <span>⚡</span> 60-Second Mode — Compress everything into one paragraph
  </button>
</div>

<div class="compression-result" id="compression-result">
  <div class="comp-label">⚡ 60-Second Summary</div>
  <div class="comp-text" id="comp-text"></div>
</div>

<div class="chips-wrap">
  <div class="chips" id="chips">
    <button class="chip active" data-topic="all">All</button>
    <button class="chip" data-topic="Tech">Tech</button>
    <button class="chip" data-topic="Science">Science</button>
    <button class="chip" data-topic="World">World</button>
    <button class="chip" data-topic="Business">Business</button>
    <button class="chip" data-topic="Health">Health</button>
    <button class="chip" data-topic="Space">Space</button>
    <button class="chip" data-topic="Climate">Climate</button>
  </div>
</div>

<div class="feed" id="feed"></div>
<div class="load-trigger" id="load-trigger">
  <div class="load-spinner" id="load-spinner"></div>
</div>

<div class="reading-dna" id="reading-dna" onclick="toggleDNATooltip()"></div>
<div class="reading-dna-tooltip" id="dna-tooltip">
  <div class="dna-title">Your Reading DNA</div>
  <div class="dna-breakdown" id="dna-breakdown"></div>
</div>

<!-- Load 12 feature modules in dependency order -->
<script src="js/01-theme.js"></script>
<script src="js/06-sound.js"></script>
<script src="js/02-bias.js"></script>
<script src="js/03-decay.js"></script>
<script src="js/07-pace.js"></script>
<script src="js/04-dna.js"></script>
<script src="js/05-fossil.js"></script>
<script src="js/08-counter.js"></script>
<script src="js/10-silent.js"></script>
<script src="js/11-debate.js"></script>
<script src="js/12-timeshift.js"></script>
<script src="js/09-compress.js"></script>
<script src="js/core.js"></script>

</body>
</html>
